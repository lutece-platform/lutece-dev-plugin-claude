worker_processes auto;
events { worker_connections 1024; }

http {
    # Level 2: round-robin (NO ip_hash). The HTTP session is replicated via
    # Hazelcast (sessionCache-1.0) => it survives node switching, so sticky is no longer needed.
    upstream lutece_cluster {
        server app1:9090;
        server app2:9090;
        server app3:9090;
    }

    log_format upstreamlog '$remote_addr -> $upstream_addr "$request" $status';
    access_log /var/log/nginx/access.log upstreamlog;

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://lutece_cluster;
            # $http_host (NOT $host) keeps the port: Lutece builds absolute redirects from the Host
            # header, so without the port it would redirect to http://localhost/ (port 80) and a
            # browser following the redirect gets ERR_CONNECTION_REFUSED. Breaks every redirect flow
            # (admin login, do* actions). Keep the original Host:port.
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header X-Forwarded-Port  $server_port;
            # Reveals the chosen backend (routing check):
            add_header X-Upstream $upstream_addr always;
        }
    }
}
