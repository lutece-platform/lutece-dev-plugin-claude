# Switch Lutece to the container-managed datasource (JNDI) instead of the built-in pool.
# ManagedConnectionService does ctx.lookup(portal.ds) -> jdbc/portal datasource defined in server.xml (Liberty),
# which points to MariaDB (host/db/user/pwd provided by the container env vars).
portal.poolservice=fr.paris.lutece.util.pool.service.ManagedConnectionService
portal.ds=jdbc/portal
